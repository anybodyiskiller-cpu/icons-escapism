name: Auto Update Icons

on:
  push:
    paths:
      - "icons/**"
      - "flags/**"
      - "music/**"
      - "generate.js"
      - ".github/workflows/update-icons.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run generate.js
        run: node generate.js

      - name: Validate generated JSON
        run: |
          node - <<'NODE'
          const fs = require("fs");
          for (const file of ["icons.json", "flags.json", "music.json"]) {
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            if (!Array.isArray(data.icons)) {
              throw new Error(`${file} missing icons array`);
            }
            for (const icon of data.icons) {
              if (!icon.name || !icon.url) {
                throw new Error(`${file} contains an invalid icon entry`);
              }
              const parsed = new URL(icon.url);
              if (parsed.href !== icon.url) {
                throw new Error(`${file} contains a non-canonical URL: ${icon.url}`);
              }
              if (/[\s"'<>]/.test(icon.url)) {
                throw new Error(`${file} contains an unsafe URL: ${icon.url}`);
              }
            }
            console.log(`${file}: ${data.icons.length} icons`);
          }
          NODE

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add icons.json flags.json music.json

          if git diff --staged --quiet; then
            echo "✅ 没有检测到 JSON 变化，无需提交"
            exit 0
          fi

          git commit -m "auto update json"
          git push
          echo "✅ JSON 文件已更新并推送"
