name: Auto Update Icons

on:
  push:
    paths:
      - 'icons/*.png'

# 关键：赋予写入权限（解决 git push 权限问题）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 升级到 v4（推荐）

      - name: Setup Node
        uses: actions/setup-node@v4   # 升级到 v4
        with:
          node-version: 20            # 升级到 20 或 22（18 也可以，但建议更新）

      - name: Run script
        run: node generate.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add icons.json
          if git diff --staged --quiet; then
            echo "没有变化，无需提交"
          else
            git commit -m "auto update icons.json"
            git push
          fi
